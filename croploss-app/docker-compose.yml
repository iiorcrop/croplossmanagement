version: "3.8"

services:
  # ── Backend API ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: croploss-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=7070
    ports:
      - "7070:7070"
    networks:
      - croploss-net
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7070/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Nginx serving React build) ──────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: croploss-frontend
    restart: unless-stopped
    ports:
      - "7001:80"
    networks:
      - croploss-net
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: croploss-nginx
    restart: unless-stopped
    ports:
      - "7000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - croploss-net
    depends_on:
      - backend
      - frontend

networks:
  croploss-net:
    driver: bridge
